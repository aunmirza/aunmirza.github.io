<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Aun Mirza</title>

  <!-- Favicon -->
 <link rel="icon" type="image/png" href="logo.png">


  <link rel="stylesheet" href="style.css" />
  <style>

    body {
      background: #fcfbf9;
      color: #111827;
    }
    .contact-container {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }
    .contact-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .contact-sub {
      color: #6b7280;
      margin-bottom: 30px;
    }
    .contact-box {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    .contact-box h3 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 800;
    }
    .contact-info p {
      margin: 6px 0;
      font-size: 15px;
    }
    .contact-info a {
      color: #2596be;
      font-weight: 600;
    }
    .social-links {
      display: flex;
      gap: 14px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .social-links a {
      padding: 8px 14px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      transition: .2s;
    }
    .social-links a:hover {
      background: #2596be;
      color: white;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      margin-bottom: 14px;
      font-size: 15px;
    }
    .contact-form button {
      padding: 12px 20px;
      background: #2596be;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    .contact-form button:hover {
      background: #1f7fa0;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-row">

      <a class="brand" href="index.html">@aunmirza</a>

      <nav class="nav desktop-nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>


      <button class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <div class="contact-container">

    <h1 class="contact-title">Contact Me</h1>
    <p class="contact-sub">Feel free to reach out anytime</p>

    <div class="contact-box contact-info">
      <h3>My Information</h3>

      <!-- replace with your real phone + email -->
      <p><strong>Phone:</strong> <a href="tel:+1234567890">+39 389 644 9602</a></p>
      <p><strong>Email:</strong> <a href="mailto:yourgmail@gmail.com">aunmirza50@gmail.com</a></p>

      <h3 style="margin-top:20px;">Social Links</h3>
      <div class="social-links">
        <a class="social-link" href="https://www.instagram.com/aunmrizich/">Instagram</a>
        <a class="social-link" href="www.linkedin.com/in/aun-mirza-247762175">LinkedIn</a>
        <a class="social-link" href="https://github.com/aunmirza">GitHub</a>
      </div>
    </div>

    <div class="contact-box">
      <h3>Send Me a Message</h3>

      <!-- replace yourgmail@gmail.com with your real Gmail -->
      <form class="contact-form" action="https://formsubmit.co/aunmirza50@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

  </div>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");

    const saved = localStorage.getItem("theme");
    if (saved) root.setAttribute("data-theme", saved);

    toggle.addEventListener("click", () => {
      const current = root.getAttribute("data-theme");
      const next = current === "light" ? "dark" : "light";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    const menuBtn = document.getElementById("menuBtn");
    const mobileNav = document.getElementById("mobileNav");

    menuBtn.addEventListener("click", () => {
      mobileNav.classList.toggle("show");
    });

    const header = document.querySelector(".header");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 10) {
        header.classList.add("scrolled");
      } else {
        header.classList.remove("scrolled");
      }
    });
  </script>

</body>
</html>
